workflow:
  metadata:
    id: workflows/create-carousel
    name: "Criar Carrossel Instagram"
    trigger: "/create-carousel"
    description: "Criar carrossel completo para Instagram"
    icon: "🎠"
    version: "1.0.0"
    author: "Igor Rocha"
    created: "2026-03-10"

  agents_involved:
    orchestrator: "content-director"
    workers:
      - "copywriter"
      - "design-director"
      - "carousel-creator"
      - "channel-controller"

  input:
    required:
      - "tema: Assunto do carrossel"
    optional:
      - "num_slides: Número de slides (3-10, default 7)"
      - "estilo: quote-minimalist, lista, comparação, tutorial"
      - "referencia: URL ou content_id de inspiração"

  steps:
    - step: 1
      agent: "content-director"
      action: "Definir briefing do carrossel"
      description: |
        Definir tema, objetivo, público e mensagem principal.
        Definir número de slides e estilo.
      output: "Briefing do carrossel"

    - step: 2
      agent: "copywriter"
      action: "Escrever texto dos slides"
      description: |
        Criar texto para cada slide (max 30 palavras/slide).
        Estruturar storytelling: hook → desenvolvimento → CTA.
        Entregar 2 versões para escolha.
      output: "Texto por slide (2 versões)"

    - step: 3
      agent: "design-director"
      action: "Validar design tokens"
      description: |
        Confirmar tokens de design para o carrossel.
        Cores, fontes, layout, posição da foto de perfil.
      output: "Design tokens confirmados"

    - step: 4
      agent: "content-director"
      action: "Aprovar texto"
      description: |
        Apresentar texto dos slides ao Igor.
        Aguardar aprovação ou ajustes.
      output: "Texto aprovado"

    - step: 5
      agent: "carousel-creator"
      action: "Gerar imagens"
      description: |
        Com texto aprovado e design tokens:
        - Gerar HTML por slide
        - Renderizar via Playwright (1080x1350px)
        - Exportar como PNG
      output: "Imagens do carrossel (1080x1350px cada)"

    - step: 6
      agent: "channel-controller"
      action: "Preparar publicação"
      description: |
        Gerar legenda completa com hashtags (20-30).
        Definir horário ideal de publicação.
      output: "Carrossel pronto para publicação"

    - step: 7
      agent: "content-director"
      action: "Aprovação final"
      description: |
        Apresentar carrossel completo: imagens + legenda + hashtags.
        Aguardar aprovação final do Igor.
        Salvar em ct_content_items e agendar.
      output: "Carrossel aprovado e agendado"

  specs:
    slide_width: 1080
    slide_height: 1350
    max_slides: 10
    max_words_per_slide: 30
    bg_color: "#0D0D0D"
    text_color: "#FFFFFF"
    font: "Inter"

  success_criteria:
    - "Carrossel com 3-10 slides em 1080x1350px"
    - "Max 30 palavras por slide"
    - "Design system aplicado corretamente"
    - "Legenda + hashtags prontos"
    - "Aprovado pelo Igor"
